apis:
  - aid: hostbill:hostbill-admin-api
    name: HostBill Admin API
    description: >-
      The HostBill Admin API enables custom applications to call HostBill
      functions remotely via HTTP protocol, providing access to client
      management, invoicing, service provisioning, billing operations, ticket
      handling, and plugin integrations including DNS, IPAM, Proxmox, and
      VMManager.
    humanURL: https://api2.hostbillapp.com/
    baseURL: https://yourinstance.hostbillapp.com/api2.php
    tags:
