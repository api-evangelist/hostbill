aid: hostbill
name: HostBill
description: >-
  HostBill is a comprehensive billing and automation software for web hosting
  providers, domain registrars, and online service companies. HostBill provides
  an Admin API that enables custom applications to call HostBill functions
  remotely via HTTP protocol or from HostBill modules.
type: Index
