naftiko: 1.0.0-alpha2
info:
  label: HostBill Admin API — Domains
  description: 'HostBill Admin API — Domains. 1 operations. Lead operation: List domains. Self-contained Naftiko capability
    covering one Hostbill business surface.'
  tags:
  - Hostbill
  - Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HOSTBILL_API_KEY: HOSTBILL_API_KEY
capability:
  consumes:
  - type: http
    namespace: hostbill-domains
    baseUri: https://yourinstance.hostbillapp.com
    description: HostBill Admin API — Domains business capability. Self-contained, no shared references.
    resources:
    - name: admin-api.php#getDomains
      path: /admin/api.php#getDomains
      operations:
      - name: getdomains
        method: POST
        description: List domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: api_id
      value: '{{env.HOSTBILL_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: hostbill-domains-rest
    port: 8080
    description: REST adapter for HostBill Admin API — Domains. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/api-php-getdomains
      name: admin-api-php-getdomains
      description: REST surface for admin-api.php#getDomains.
      operations:
      - method: POST
        name: getdomains
        description: List domains
        call: hostbill-domains.getdomains
        with:
          call: rest.call
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hostbill-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for HostBill Admin API — Domains. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-domains
      description: List domains
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: hostbill-domains.getdomains
      with:
        call: tools.call
      outputParameters:
      - type: object
        mapping: $.
