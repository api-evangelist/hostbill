naftiko: 1.0.0-alpha2
info:
  label: HostBill Admin API — Clients
  description: 'HostBill Admin API — Clients. 1 operations. Lead operation: List clients. Self-contained Naftiko capability
    covering one Hostbill business surface.'
  tags:
  - Hostbill
  - Clients
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HOSTBILL_API_KEY: HOSTBILL_API_KEY
capability:
  consumes:
  - type: http
    namespace: hostbill-clients
    baseUri: https://yourinstance.hostbillapp.com
    description: HostBill Admin API — Clients business capability. Self-contained, no shared references.
    resources:
    - name: admin-api.php#getClients
      path: /admin/api.php#getClients
      operations:
      - name: getclients
        method: POST
        description: List clients
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: call
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: api_id
      value: '{{env.HOSTBILL_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: hostbill-clients-rest
    port: 8080
    description: REST adapter for HostBill Admin API — Clients. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/api-php-getclients
      name: admin-api-php-getclients
      description: REST surface for admin-api.php#getClients.
      operations:
      - method: POST
        name: getclients
        description: List clients
        call: hostbill-clients.getclients
        with:
          call: rest.call
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hostbill-clients-mcp
    port: 9090
    transport: http
    description: MCP adapter for HostBill Admin API — Clients. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-clients
      description: List clients
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: hostbill-clients.getclients
      with:
        call: tools.call
      outputParameters:
      - type: object
        mapping: $.
